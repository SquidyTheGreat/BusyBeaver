{% extends "base.html" %}
{% block title %}Thanks — BusyBeaver{% endblock %}
{% block content %}
<div class="text-center py-5">
  <i class="bi bi-check-circle-fill text-success fs-1"></i>
  <h3 class="mt-3">Thanks for your feedback!</h3>
  <p class="text-muted">Your response for <strong>{{ task.name }}</strong> has been recorded.<br>

  <a href="/" class="btn btn-outline-primary mt-2">Go to tasks</a>
</div>
{% endblock %}
