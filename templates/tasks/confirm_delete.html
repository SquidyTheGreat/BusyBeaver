{% extends "base.html" %}
{% block title %}Delete Task — BusyBeaver{% endblock %}
{% block content %}
<div class="card mx-auto" style="max-width:480px">
  <div class="card-body text-center py-5">
    <i class="bi bi-trash3 fs-1 text-danger"></i>
    <h4 class="mt-3">Delete "{{ task.name }}"?</h4>
    <p class="text-muted">This will also remove all execution logs, move logs, and feedback for this task.</p>
    <form method="post" class="d-inline">
      {% csrf_token %}
      <button class="btn btn-danger me-2">Yes, delete</button>
    </form>
    <a href="/tasks/{{ task.id }}/" class="btn btn-outline-secondary">Cancel</a>
  </div>
</div>
{% endblock %}
