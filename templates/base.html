<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}BusyBeaver{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    .priority-1 { border-left: 4px solid #6c757d; }
    .priority-2 { border-left: 4px solid #0d6efd; }
    .priority-3 { border-left: 4px solid #fd7e14; }
    .priority-4 { border-left: 4px solid #dc3545; }
    .status-badge-pending      { background: #6c757d; }
    .status-badge-scheduled    { background: #0d6efd; }
    .status-badge-in_progress  { background: #ffc107; color: #000; }
    .status-badge-completed    { background: #198754; }
    .status-badge-skipped      { background: #6c757d; }
    .status-badge-cancelled    { background: #dc3545; }
    .health-bar { height: 8px; border-radius: 4px; }
  </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">🦫 BusyBeaver</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/">Tasks</a></li>
        <li class="nav-item"><a class="nav-link" href="/schedule/">Schedule</a></li>
        <li class="nav-item"><a class="nav-link" href="/schedule/blocks/">Blocks</a></li>
        <li class="nav-item"><a class="nav-link" href="/analytics/">Analytics</a></li>
        <li class="nav-item"><a class="nav-link" href="/health/">Health</a></li>
      </ul>
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="/schedule/calendars/"><i class="bi bi-calendar3"></i> Calendar</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4 mb-5">
  {% for message in messages %}
  <div class="alert alert-{% if message.tags == 'error' %}danger{% elif message.tags == 'warning' %}warning{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show" role="alert">
    {{ message }}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  {% endfor %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
